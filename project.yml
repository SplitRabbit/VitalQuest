name: VitalQuest
options:
  bundleIdPrefix: com.vitalquest
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
  defaultConfig: Debug
settings:
  base:
    SWIFT_VERSION: "5"
    SWIFT_UPCOMING_FEATURE_CONCISE_MAGIC_FILE: YES
    SWIFT_UPCOMING_FEATURE_FORWARD_TRAILING_CLOSURES: YES
    GENERATE_INFOPLIST_FILE: YES
targets:
  VitalQuest:
    type: application
    platform: iOS
    sources:
      - VitalQuest
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vitalquest.app
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSHealthShareUsageDescription: "VitalQuest uses your health data to calculate personalized recovery, sleep, activity, and readiness scores."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "VitalQuest needs write access to log your health activities."
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    entitlements:
      path: VitalQuest/VitalQuest.entitlements
  VitalQuestTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - VitalQuestTests
    dependencies:
      - target: VitalQuest
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vitalquest.tests
